<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat con Asesor — Biótica Consultores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green-deep: #1a3a2a;
        --green-mid: #2d5e40;
        --green-vivid: #3a8c58;
        --green-light: #6bbf7a;
        --green-pale: #d4ead9;
        --cream: #f5f0e8;
        --text-dark: #1a2416;
        --text-soft: #6b7d66;
        --white: #ffffff;
        --red: #c0392b;
        --gold: #c9a84c;
        --shadow: 0 4px 24px rgba(26, 58, 42, 0.12);
        --shadow-lg: 0 12px 48px rgba(26, 58, 42, 0.18);
        --radius: 12px;
        --radius-lg: 20px;
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--green-deep);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 20% 50%,
          rgba(58, 140, 88, 0.12) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      .chat-wrap {
        width: 100%;
        max-width: 560px;
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 90vh;
        max-height: 700px;
      }

      /* Header */
      .chat-top {
        background: var(--green-deep);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.85rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .back-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: rgba(255, 255, 255, 0.8);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition);
        flex-shrink: 0;
      }
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .asesor-photo {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        object-fit: cover;
        object-position: top;
        border: 2px solid var(--green-light);
        flex-shrink: 0;
      }
      .asesor-photo-placeholder {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--green-vivid);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        flex-shrink: 0;
        border: 2px solid var(--green-light);
      }
      .asesor-chat-info {
        flex: 1;
      }
      .asesor-chat-name {
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        color: var(--white);
        font-weight: 700;
      }
      .asesor-chat-cargo {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.6);
      }
      .asesor-chat-status {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        margin-top: 0.15rem;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #9ca3af;
      }
      .status-dot.online {
        background: #4ade80;
        animation: pulse-dot 2s infinite;
      }
      .status-text {
        color: rgba(255, 255, 255, 0.6);
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* Messages */
      .chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem;
        background: #f7faf7;
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        position: relative;
      }
      .chat-body::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 35%;
        aspect-ratio: 3/4;
        background: url("/images/GIO.png") no-repeat center;
        background-size: contain;
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
      }
      .chat-body > * {
        position: relative;
        z-index: 1;
      }
      .chat-body::-webkit-scrollbar {
        width: 4px;
      }
      .chat-body::-webkit-scrollbar-thumb {
        background: var(--green-pale);
        border-radius: 4px;
      }

      .msg {
        display: flex;
        flex-direction: column;
        max-width: 78%;
      }
      .msg.from-me {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg.from-other {
        align-self: flex-start;
        align-items: flex-start;
      }
      .msg.system {
        align-self: center;
        align-items: center;
        max-width: 90%;
      }

      .msg-bubble {
        padding: 0.65rem 1rem;
        border-radius: 18px;
        font-size: 0.875rem;
        line-height: 1.55;
        word-break: break-word;
      }
      .from-me .msg-bubble {
        background: var(--green-vivid);
        color: var(--white);
        border-bottom-right-radius: 4px;
      }
      .from-other .msg-bubble {
        background: var(--white);
        color: var(--text-dark);
        border: 1px solid var(--green-pale);
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .system .msg-bubble {
        background: rgba(26, 58, 42, 0.07);
        color: var(--text-soft);
        font-size: 0.78rem;
        border-radius: 50px;
        padding: 0.35rem 0.9rem;
        text-align: center;
      }

      .msg-meta {
        font-size: 0.7rem;
        color: var(--text-soft);
        margin-top: 0.25rem;
        padding: 0 0.25rem;
      }
      .msg-name {
        font-weight: 600;
        color: var(--green-vivid);
      }

      /* Typing */
      .typing-bubble {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 0.75rem 1rem;
        background: var(--white);
        border: 1px solid var(--green-pale);
        border-radius: 18px;
        border-bottom-left-radius: 4px;
      }
      .typing-bubble span {
        width: 7px;
        height: 7px;
        background: var(--green-vivid);
        border-radius: 50%;
        animation: typing-bounce 1.2s infinite;
      }
      .typing-bubble span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-bubble span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes typing-bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-6px);
        }
      }

      /* Input */
      .chat-footer {
        background: var(--white);
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        padding: 0.9rem 1.1rem;
        display: flex;
        gap: 0.6rem;
        align-items: center;
        border-top: 1px solid var(--green-pale);
      }
      .chat-footer input {
        flex: 1;
        padding: 0.6rem 1rem;
        border-radius: 50px;
        border: 1.5px solid var(--green-pale);
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        outline: none;
        transition: border-color var(--transition);
      }
      .chat-footer input:focus {
        border-color: var(--green-vivid);
      }
      .chat-footer input:disabled {
        background: #f7faf7;
        color: var(--text-soft);
      }
      .send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: var(--green-vivid);
        color: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background var(--transition),
          transform var(--transition);
      }
      .send-btn:hover {
        background: var(--green-mid);
        transform: scale(1.08);
      }
      .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* Offline banner */
      .offline-banner {
        background: rgba(201, 168, 76, 0.15);
        border: 1px solid var(--gold);
        border-radius: 10px;
        padding: 0.75rem 1rem;
        font-size: 0.82rem;
        color: #7a5e0a;
        text-align: center;
        margin: 0.5rem 1.25rem;
      }

      /* Logo top */
      .chat-brand {
        text-align: center;
        margin-bottom: 0.75rem;
      }
      .chat-brand a {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 0.8rem;
      }
      .chat-brand a:hover {
        color: rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="chat-wrap">
      <div class="chat-brand">
        <a href="/">← Volver a Biótica Consultores</a>
      </div>

      <div class="chat-top">
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="asesor-photo-placeholder" id="asesor-avatar">🌿</div>
        <div class="asesor-chat-info">
          <div class="asesor-chat-name" id="asesor-chat-name">Cargando...</div>
          <div class="asesor-chat-cargo" id="asesor-chat-cargo"></div>
          <div class="asesor-chat-status">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">Conectando...</span>
          </div>
        </div>
      </div>

      <div id="offline-banner" class="offline-banner" style="display: none">
        ⚠️ El asesor no está disponible ahora. Tu mensaje quedará registrado y
        te responderá pronto.
      </div>

      <div class="chat-body" id="chat-body"></div>

      <div class="chat-footer">
        <input
          type="text"
          id="msg-input"
          placeholder="Escribe tu mensaje..."
          autocomplete="off"
          disabled
        />
        <button class="send-btn" id="send-btn" disabled>
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </div>

    <script>
      const ASESORES_INFO = {
        jose: {
          nombre: "José Ariel Dueñas Cepeda",
          cargo: "Director Técnico y Científico",
          foto: "/images/asesor-jose.webp",
        },
        elkin: {
          nombre: "Elkin René Briceño Lara",
          cargo: "Director Desarrollo Sostenible e Innovación",
          foto: "/images/asesor-elkin.webp",
        },
        leonel: {
          nombre: "Leonel Andrés Torres",
          cargo: "Apoyo Técnico en Campo",
          foto: "/images/asesor-leonel.webp",
        },
      };

      // Leer parámetros de URL
      const params = new URLSearchParams(location.search);
      const room = params.get("asesor") || "jose";
      const rolParam = params.get("rol") || "usuario";
      const asesor = ASESORES_INFO[room] || ASESORES_INFO.jose;

      // Nombre del usuario desde sesión o parámetro
      const userName =
        rolParam === "asesor"
          ? params.get("nombre") || asesor.nombre
          : sessionStorage.getItem("biotica_user_name") ||
            params.get("nombre") ||
            "Usuario";

      // Mostrar info del asesor
      document.getElementById("asesor-chat-name").textContent = asesor.nombre;
      document.getElementById("asesor-chat-cargo").textContent = asesor.cargo;
      const avatarEl = document.getElementById("asesor-avatar");
      const img = document.createElement("img");
      img.src = asesor.foto;
      img.alt = asesor.nombre;
      img.className = "asesor-photo";
      img.onerror = () => {
        avatarEl.innerHTML = "🌿";
      };
      avatarEl.replaceWith(img);

      // ── Chat ──
      const chatBody = document.getElementById("chat-body");
      const input = document.getElementById("msg-input");
      const sendBtn = document.getElementById("send-btn");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");

      // ID único de esta sesión para distinguir mensajes propios
      const clientId = Math.random().toString(36).slice(2);
      let ws,
        typingTimer,
        myUserId = null;

      function addMsg(text, side, nombre, ts) {
        // side: 'me' | 'other' | 'system'
        const div = document.createElement("div");
        div.className = `msg ${side === "me" ? "from-me" : side === "system" ? "system" : "from-other"}`;
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.textContent = text;
        div.appendChild(bubble);
        if (side !== "system") {
          const meta = document.createElement("div");
          meta.className = "msg-meta";
          if (side === "me") {
            meta.textContent = ts || "";
          } else {
            meta.innerHTML = nombre
              ? `<span class="msg-name">${nombre}</span>${ts ? " · " + ts : ""}`
              : ts || "";
          }
          div.appendChild(meta);
        }
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;
      }

      function showTyping(nombre) {
        removeTyping();
        const d = document.createElement("div");
        d.className = "msg from-other";
        d.id = "typing-indicator";
        d.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>
        <div class="msg-meta"><span class="msg-name">${nombre}</span> está escribiendo...</div>`;
        chatBody.appendChild(d);
        chatBody.scrollTop = chatBody.scrollHeight;
      }
      function removeTyping() {
        document.getElementById("typing-indicator")?.remove();
      }

      function setStatus(online) {
        statusDot.className = "status-dot" + (online ? " online" : "");
        statusText.textContent = online ? "En línea" : "Desconectado";
        document.getElementById("offline-banner").style.display = online
          ? "none"
          : "block";
      }

      function connect() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${proto}://${location.host}`);

        ws.onopen = () => {
          ws.send(
            JSON.stringify({
              type: "join",
              room,
              rol: rolParam,
              nombre: userName,
              clientId,
            }),
          );
        };

        ws.onmessage = (e) => {
          let msg;
          try {
            msg = JSON.parse(e.data);
          } catch {
            return;
          }
          removeTyping();

          if (msg.type === "joined") {
            // Guardar userId asignado por el servidor
            if (msg.userId) myUserId = msg.userId;
            // Para asesor: mostrar estado de sala
            if (rolParam === "asesor") {
              setStatus(true);
              input.disabled = false;
              sendBtn.disabled = false;
            } else {
              setStatus(msg.asesorOnline);
              input.disabled = false;
              sendBtn.disabled = false;
            }
            addMsg(msg.text, "system");
            input.focus();
          }

          if (msg.type === "message") {
            // Es mío si el clientId coincide
            const isMe = msg.clientId === clientId;
            if (isMe) {
              addMsg(msg.text, "me", null, msg.ts);
            } else {
              addMsg(msg.text, "other", msg.nombre, msg.ts);
            }
          }

          if (msg.type === "asesor-status") {
            if (rolParam !== "asesor") setStatus(msg.online);
            addMsg(msg.text, "system");
          }

          if (msg.type === "user-joined") {
            addMsg(`${msg.nombre} se ha unido al chat.`, "system");
          }
          if (msg.type === "user-left") {
            addMsg(`${msg.nombre} ha salido del chat.`, "system");
          }

          if (msg.type === "typing") {
            showTyping(msg.nombre);
            clearTimeout(typingTimer);
            typingTimer = setTimeout(removeTyping, 2500);
          }
        };

        ws.onclose = () => {
          if (rolParam !== "asesor") setStatus(false);
          statusText.textContent = "Reconectando...";
          setTimeout(connect, 3000);
        };

        ws.onerror = (err) => {
          console.error("WS error:", err);
        };
      }

      function sendMessage() {
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== 1) return;
        // Enviar con clientId para identificar mensajes propios
        ws.send(JSON.stringify({ type: "message", text, clientId }));
        input.value = "";
        // Cancelar typing
        clearTimeout(typingTimer);
      }

      sendBtn.addEventListener("click", sendMessage);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      let typingSent = false;
      input.addEventListener("input", () => {
        if (ws && ws.readyState === 1 && !typingSent) {
          ws.send(JSON.stringify({ type: "typing" }));
          typingSent = true;
          setTimeout(() => {
            typingSent = false;
          }, 1500);
        }
      });

      connect();
    </script>
  </body>
</html>
